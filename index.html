<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forge iPhone AirPlay Proof Test</title>
  <style>
    body {
      margin: 0;
      padding: 32px 20px;
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    .wrap {
      max-width: 520px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.6rem;
      margin-bottom: 12px;
    }
    p {
      line-height: 1.5;
      color: #ddd;
      margin-bottom: 18px;
    }
    audio {
      width: 100%;
      margin: 20px 0;
    }
    .note {
      font-size: 0.95rem;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Forge iPhone AirPlay Proof Test</h1>
    <p>Tap play on the audio player below. Then use the iPhone AirPlay picker to send it to your TV.</p>

    <audio
      controls
      preload="auto"
      playsinline
      x-webkit-airplay="allow"
      src="https://streaming.live365.com/a31364">
    </audio>

    <p class="note">If this still spins after choosing the TV, the issue is the stream handoff from iPhone web playback to AirPlay, not your custom app code.</p>
  </div>
</body>
</html>
